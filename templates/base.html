{% load static %}
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Smart Work</title>

    <!-- 1. Bootstrap CSS በኦንላይን እንዲጫን ተደርጓል -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .main-content {
            flex: 1;
            width: 100%;
            padding-bottom: 80px;
        }

        /* 2. dashboard-container ሙሉ ስፋት እንዲይዝ */
        .dashboard-container {
            width: 100%;
            padding: 15px;
            box-sizing: border-box;
        }

        .footer-nav {
            background: #2c3e50;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 1000;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
        }

        /* 3. የአገናኝ ስታይል - በRender ላይም እንዲታይ */
        .nav-link {
            color: #ecf0f1 !important; /* !important ተጨምሯል */
            text-decoration: none;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

    <nav class="footer-nav">
        <a href="{% url 'dashboard' %}" class="nav-link"><div>🏠</div>Home</a>
        <a href="#" class="nav-link"><div>💰</div>Earn</a>
        <a href="#" class="nav-link"><div>📦</div>Orders</a>
        <a href="#" class="nav-link"><div>👥</div>Team</a>
        <a href="{% url 'profile' %}" class="nav-link"><div>👤</div>Profile</a>
    </nav>

</body>
</html>
