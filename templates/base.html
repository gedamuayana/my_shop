{% load static %}
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Smart Work</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            width: 100%;
            padding-bottom: 70px; /* Footer እንዳይሸፍን ክፍተት */
        }

        .dashboard-container {
            width: 100%;
            max-width: 600px; /* ለስልክ ተስማሚ */
            margin: auto;
            padding: 15px;
        }

        .footer-nav {
            background: #2c3e50;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 1000; /* ሌሎች ነገሮች እንዳይሸፍኑት */
        }
        .nav-link {
            color: #ecf0f1;
            text-decoration: none;
            font-size: 12px;
        }
        .nav-link:hover {
            color: #8BC34A;
        }
    </style>
</head>
<body>

    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

    <nav class="footer-nav">
        <a href="{% url 'dashboard' %}" class="nav-link text-center">
            <div>🏠</div><div>Home</div>
        </a>
        <a href="#" class="nav-link text-center">
            <div>💰</div><div>Earn</div>
        </a>
        <a href="#" class="nav-link text-center">
            <div>📦</div><div>Orders</div>
        </a>
        <a href="#" class="nav-link text-center">
            <div>👥</div><div>Team</div>
        </a>
        <a href="{% url 'profile' %}" class="nav-link text-center">
            <div>👤</div><div>Profile</div>
        </a>
    </nav>

</body>
</html>
