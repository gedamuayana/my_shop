{% load static %}
<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Smart Work</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; padding-bottom: 80px; }
        .dashboard-container { padding: 20px; max-width: 500px; margin: auto; }
        .welcome-banner { background: linear-gradient(90deg, #6a11cb, #2575fc); color: white; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .wallet-card { background: #8BC34A; color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .vip-ad { background: #FFC107; color: #333; font-weight: bold; padding: 10px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .quick-actions { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .action-btn { background: white; padding: 15px; border-radius: 15px; text-align: center; width: 30%; text-decoration: none; color: black; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .action-btn p { margin: 5px 0 0 0; font-size: 12px; }

        /* Footer Style */
        .footer-nav { background: white; border-top: 1px solid #ddd; padding: 10px 0; position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; }
        .nav-link { color: #555; text-decoration: none; font-size: 12px; }
        .nav-link:hover { color: #8BC34A; }
    </style>
</head>
<body>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <nav class="footer-nav">
        <a href="{% url 'dashboard' %}" class="nav-link text-center">
            <div>🏠</div><div>Home</div>
        </a>
        <a href="#" class="nav-link text-center">
            <div>💰</div><div>Earn</div>
        </a>
        <a href="#" class="nav-link text-center">
            <div>📦</div><div>Orders</div>
        </a>
        <a href="#" class="nav-link text-center">
            <div>👥</div><div>Team</div>
        </a>
        <a href="{% url 'profile' %}" class="nav-link text-center">
            <div>👤</div><div>Profile</div>
        </a>
    </nav>

</body>
</html>
