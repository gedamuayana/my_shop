{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow p-4">
            <h3 class="text-center mb-4">አዲስ መመዝገቢያ (Sign Up)</h3>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-success w-100 mt-3">ተመዝገብ</button>
            </form>
            <p class="text-center mt-3">አካውንት አለዎት? <a href="{% url 'login' %}">እዚህ ይግቡ</a></p>
        </div>
    </div>
</div>
{% endblock %}
