{% extends 'base.html' %}
{% block content %}
<div class="card p-4 shadow-sm col-md-4 mx-auto mt-5">
    <h3 class="text-center mb-4">መግቢያ (Login)</h3>
    <form method="POST">
        {% csrf_token %}
        {% if form.errors %}
            <div class="alert alert-danger">የተሳሳተ ዩዘርኔም ወይም ፓስወርድ!</div>
        {% endif %}
        <div class="mb-3">
            <label class="form-label">የተጠቃሚ ስም (Username)</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">የይለፍ ቃል (Password)</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg">ግባ</button>
    </form>
</div>
{% endblock %}
