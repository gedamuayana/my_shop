<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>የይለፍ ቃል ማስተካከያ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-md w-96">
        <h2 class="text-2xl font-bold mb-6 text-slate-800">የጠፋ ፓስወርድ መቀየሪያ</h2>

        {% if messages %}
            <div class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm space-y-1">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-600 mb-2">ዩዘርኔም (Username)</label>
                <input type="text" name="username" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" value="{{ request.POST.username }}">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-600 mb-2">አዲስ የይለፍ ቃል (New Password)</label>
                <input type="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-slate-600 mb-2">የይለፍ ቃል እንደገና ያስገቡ (Confirm Password)</label>
                <input type="password" name="confirm_password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 transition duration-200">ቀይር</button>
        </form>

        <div class="mt-4 text-center">
            <a href="{% url 'login' %}" class="text-sm text-indigo-600 hover:underline">ወደ መግቢያ መመለስ</a>
        </div>
    </div>
</body>
</html>
