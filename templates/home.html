<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ዋና ገጽ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col items-center justify-center p-4">
    <div class="text-center max-w-xl bg-white p-10 rounded-3xl shadow-xl border border-slate-100">
        <h1 class="text-4xl font-black text-indigo-900 mb-4">
            እንኳን ወደ ኦንላይን መመሪያ (Task) ሲስተም በደህና መጡ
        </h1>
        <p class="text-slate-600 mb-8">
            በቀላሉ በመመዝገብ ዕለታዊ ስራዎችን ያከናውኑ፣ ክፍያ ይፈጽሙ፤ እንዲሁም ገቢዎን ይቆጣጠሩ.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold rounded-2xl shadow-lg transition-all">ወደ ዳሽቦርድ ይግቡ</a>
            {% else %}
                <a href="{% url 'login' %}" class="px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold rounded-2xl shadow-lg transition-all">ይግቡ (Login)</a>
                <a href="{% url 'register' %}" class="px-8 py-4 bg-slate-100 hover:bg-slate-200 text-slate-800 font-extrabold rounded-2xl border border-slate-200 transition-all">ይመዝገቡ (Register)</a>
            {% endif %}
        </div>

        <div class="mt-8 flex justify-center border-t pt-6 border-slate-100">
            <span class="flex items-center gap-2 px-6 py-3 bg-slate-800 text-white rounded-xl font-bold text-lg">
                <span>🌍</span> አማርኛ
            </span>
        </div>
    </div>
</body>
</html>
