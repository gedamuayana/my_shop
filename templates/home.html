<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ዋና ገጽ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col items-center justify-center p-4 relative">

    <div class="absolute top-6 right-6 z-50">
        <div class="flex items-center gap-2 px-4 py-2 bg-slate-900/90 text-white rounded-full shadow-lg border border-slate-700 text-sm font-semibold backdrop-blur-sm">
            <span>🌍</span> <span>አማርኛ</span>
        </div>
    </div>

    <div class="text-center max-w-xl bg-white p-10 rounded-3xl shadow-xl border border-slate-100 mt-12">
        <h1 class="text-4xl font-black text-indigo-900 mb-4">
            እንኳን ወደ ኦንላይን መመሪያ (Task) ሲስተም በደህና መጡ
        </h1>
        <p class="text-slate-600 mb-8">
            በቀላሉ በመመዝገብ ዕለታዊ ስራዎችን ያከናውኑ፣ ክፍያ ይፈጽሙ፤ እንዲሁም ገቢዎን ይቆጣጠሩ.
        </p>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            {% if user.is_authenticated %}
                <a href="{% url 'dashboard' %}" class="px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold rounded-2xl shadow-lg transition-all">ወደ ዳሽቦርድ ይግቡ</a>
            {% else %}
                <a href="{% url 'login' %}" class="flex items-center justify-center gap-2 px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold rounded-2xl shadow-lg transition-all">
                    <span>🔑</span> ይግቡ
                </a>
                <a href="{% url 'register' %}" class="flex items-center justify-center gap-2 px-8 py-4 bg-slate-100 hover:bg-slate-200 text-slate-800 font-extrabold rounded-2xl border border-slate-200 transition-all">
                    <span>📝</span> ይመዝገቡ
                </a>
            {% endif %}
        </div>
    </div>

</body>
</html>
