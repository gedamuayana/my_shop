{% extends 'base.html' %}
{% block content %}
<div class="card p-4 shadow-sm col-md-6 mx-auto mt-5">
    <h2>የይለፍ ቃል መቀየር</h2>
    <p class="text-muted">እባክዎ የተመዘገቡበትን ኢሜይል ያስገቡ። የይለፍ ቃል መቀየሪያ ሊንክ እንልክልዎታለን።</p>
    <hr>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">የኢሜይል አድራሻ (Email)</label>
            {{ form.email }}
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">ሊንክ ላክ</button>
    </form>
</div>
{% endblock %}
