{% extends 'base.html' %}
{% block content %}
<div class="card p-4 shadow-sm text-center col-md-8 mx-auto mt-5">
    <h2>እንኳን ደህና መጡ፣ {{ request.user.username }}!</h2>
    <hr>
    <h3 class="text-success my-4">የአሁኑ ባላንስዎ፦ <span id="balance">{{ wallet.balance }}</span> ብር</h3>
    <p class="fs-5">ዛሬ የሠሩት ኦርደር፦ <span id="orders-done" class="fw-bold text-primary">{{ wallet.daily_orders_done }}</span>/1</p>

    <div class="mt-4">
        <button id="orderBtn" class="btn btn-primary btn-lg px-5 py-3" {% if wallet.daily_orders_done >= 1 or wallet.balance < 1000 %}disabled{% endif %}>
            የዛሬውን ኦርደር ሥራ
        </button>

        <a href="{% url 'deposit' %}" class="btn btn-success btn-lg px-5 py-3 ms-2">ገንዘብ አስገባ</a>

        <a href="{% url 'withdraw' %}" class="btn btn-warning btn-lg px-5 py-3 ms-2">ገንዘብ አውጣ</a>
    </div>

    <div class="mt-4">
        <form action="{% url 'logout' %}" method="POST" style="display: inline;">
            {% csrf_token %}
            <button type="submit" class="btn btn-link text-danger">ከሲስተሙ ውጣ (Logout)</button>
        </form>
    </div>
</div>

<script>
// የኦርደር ሎጂክ (Fetch API)
document.getElementById('orderBtn').addEventListener('click', function() {
    fetch("{% url 'complete_order' %}", {
        method: "POST",
        headers: {
            "X-CSRFToken": "{{ csrf_token }}",
            "Content-Type": "application/json"
        }
    })
    .then(response => response.json())
    .then(data => {
        alert(data.message);
        if (data.status === 'success') {
            let currentBalance = parseFloat(document.getElementById('balance').innerText);
            document.getElementById('balance').innerText = (currentBalance + 100).toFixed(2);
            document.getElementById('orders-done').innerText = "1";
            document.getElementById('orderBtn').disabled = true;
        }
    });
});
</script>
{% endblock %}
