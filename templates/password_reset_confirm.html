{% extends 'base.html' %}
{% block content %}
<div class="card p-4 shadow-sm col-md-6 mx-auto mt-5">
    <h2>አዲስ የይለፍ ቃል ያስገቡ</h2>
    <hr>
    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn btn-success w-100 py-2">ይቆለፍ (Save)</button>
    </form>
</div>
{% endblock %}
